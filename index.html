    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --crimson: #8b1a1a;
        --gold: #c9a84c;
        --cream: #fdf8f0;
        --dark: #1a0a0a;
        --border: #f0e4cc;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--cream);
        color: var(--dark);
        min-height: 100vh;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.93);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(40px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.4s ease both;
      }
      .pop-in {
        animation: popIn 0.35s ease both;
      }
      .slide-in {
        animation: slideIn 0.4s ease both;
      }
      .as-btn {
        font-family: "Inter", sans-serif;
        cursor: pointer;
        transition: all 0.18s;
        border: none;
      }
      .as-btn:active {
        transform: scale(0.97);
      }
      .as-card {
        background: #fff;
        border-radius: 16px;
        border: 1px solid var(--border);
        overflow: hidden;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .as-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 32px rgba(139, 26, 26, 0.1);
      }
      .as-inp {
        font-family: "Inter", sans-serif;
        font-size: 14px;
        padding: 12px 16px;
        border: 1.5px solid #e8d5b0;
        border-radius: 10px;
        width: 100%;
        outline: none;
        background: #fff;
        color: var(--dark);
        transition: border 0.2s;
      }
      .as-inp:focus {
        border-color: var(--crimson);
      }
      .serif {
        font-family: "Playfair Display", serif;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>

      function useToast() {
        const [toasts, setToasts] = useState([]);
        const addToast = useCallback((msg, type = "ok") => {
          const id = Date.now();
          setToasts((p) => [...p, { id, msg, type }]);
          setTimeout(
            () => setToasts((p) => p.filter((t) => t.id !== id)),
            3200,
          );
        }, []);
        return { toasts, addToast };
      }

      function Toasts({ toasts }) {

              right: 16,

                style={{

                  color: "#fff",
                  padding: "12px 18px",
                  borderRadius: 12,
                  fontSize: 13,
                  fontWeight: 600,
                  animation: "toastIn 0.3s ease both",
                  boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
                }}
              >
                {t.type === "err" ? "✕ " : "✓ "}

            ))}

        );

      function AuthPage({ onLogin, toast }) {
        const [mode, setMode] = useState("login");
        const [f, setF] = useState({ name: "", email: "", pw: "", pw2: "" });
        const [loading, setLoading] = useState(false);
        const upd = (k) => (e) => setF((p) => ({ ...p, [k]: e.target.value }));

        function submit() {
          setLoading(true);
          setTimeout(() => {
            setLoading(false);
            if (mode === "login") {
              const users = ls.get("users") || [];
              const u = users.find((u) => u.email === f.email && u.pw === f.pw);
              if (!u) {
                toast("Invalid email or password", "err");
                return;
              }
              ls.set("session", u);
              onLogin(u);
            } else if (mode === "register") {
              if (!f.name || !f.email || !f.pw) {
                toast("Please fill all fields", "err");
                return;
              }
              if (f.pw !== f.pw2) {
                toast("Passwords do not match", "err");
                return;
              }
              const users = ls.get("users") || [];
              if (users.find((u) => u.email === f.email)) {
                toast("Email already registered", "err");
                return;
              }
              const u = {
                id: Date.now(),
                name: f.name,
                email: f.email,
                pw: f.pw,
                joined: new Date().toISOString(),
              };
              ls.set("users", [...users, u]);
              ls.set("session", u);
              toast("Welcome to Akram Sweets! 🎉");
              onLogin(u);
            } else {
              toast("Reset link sent to " + f.email + " 📧");
              setMode("login");
            }
          }, 800);
        }

        const lbl = {

          fontWeight: 600,

                    "1px solid rgba(201,168,76," + (0.06 + i * 0.02) + ")",
                  top: 10 + i * 22 + "%",
                  right: 4 + i * 14 + "%",
                  pointerEvents: "none",
                }}
              />
            ))}
            <div

                <p
                  style={{

                    fontSize: 12,
                    letterSpacing: 0.5,
                  }}
                >
                  Home of Sweets · Mogadishu
                </p>
              </div>
              <h2
                className="serif"
                style={{ fontSize: 22, color: "#8B1A1A", marginBottom: 4 }}
              >
                {mode === "login"
                  ? "Welcome back"
                  : mode === "register"
                    ? "Create account"
                    : "Reset password"}
              </h2>
              <p style={{ color: "#aaa", fontSize: 13, marginBottom: 22 }}>
                {mode === "login"
                  ? "Sign in to continue"
                  : mode === "register"
                    ? "Join the Akram family"
                    : "Enter your email below"}
              </p>
              <div
                style={{ display: "flex", flexDirection: "column", gap: 14 }}
              >
                {mode === "register" && (
                  <div>
                    <label style={lbl}>Full name</label>
                    <input
                      className="as-inp"
                      placeholder="Mohamed Adan Mohamed"
                      value={f.name}
                      onChange={upd("name")}
                    />
                  </div>
                )}
                <div>
                  <label style={lbl}>Email address</label>
                  <input
                    className="as-inp"
                    type="email"
                    placeholder="mohamed@gmail.com"
                    value={f.email}
                    onChange={upd("email")}
                  />
                </div>
                {mode !== "forgot" && (
                  <div>
                    <label style={lbl}>Password</label>
                    <input

                      type="password"
                      placeholder="••••••••"
                      value={f.pw}
                      onChange={upd("pw")}

                {mode === "register" && (

      function CartPage({ cart, setCart, toast, setPage, addOrder }) {
        const [phone, setPhone] = useState("");
        const [addr, setAddr] = useState("");
        const [busy, setBusy] = useState(false);
        const upd = (id, d) =>
          setCart((p) =>
            p
              .map((i) =>
                i.id === id ? { ...i, qty: Math.max(0, i.qty + d) } : i,
              )
              .filter((i) => i.qty > 0),
          );
        const sub = cart.reduce((s, i) => s + i.price * i.qty, 0);
        const tax = sub * 0.05;
        const total = sub + tax;
        function place() {
          if (!phone) {
            toast("Please enter your phone number", "err");
            return;
          }
          setBusy(true);
          setTimeout(() => {
            const o = {
              id:
                "ORD-" +
                Math.random().toString(36).substring(2, 8).toUpperCase(),
              items: [...cart],
              sub,
              tax,
              total,
              phone,
              addr,
              status: "Confirmed",
              date: new Date().toISOString(),
            };
            addOrder(o);
            setCart([]);
            setBusy(false);
            toast("Order placed! " + o.id);
            setPage("orders");
          }, 1200);
        }
        if (!cart.length)
          return (
            <div

                        fontSize: 16,
                        minWidth: 48,
                        textAlign: "right",
                      }}
                    >
                      {"$" + (item.price * item.qty).toFixed(2)}
                    </div>
                  </div>
                ))}
              </div>
              <div
                style={{
                  background: "#fff",
                  borderRadius: 16,
                  padding: 24,
                  border: "1px solid #F0E4CC",
                  position: "sticky",
                  top: 76,
                  height: "fit-content",
                }}
              >
                <h3
                  className="serif"
                  style={{ fontSize: 20, marginBottom: 20 }}
                >
                  Order summary
                </h3>
                <input
                  className="as-inp"
                  placeholder="Phone number *"
                  value={phone}
                  onChange={(e) => setPhone(e.target.value)}
                  style={{ marginBottom: 10 }}
                />
                <input
                  className="as-inp"
                  placeholder="Delivery address"
                  value={addr}
                  onChange={(e) => setAddr(e.target.value)}
                  style={{ marginBottom: 20 }}
                />
                {[
                  ["Subtotal", "$" + sub.toFixed(2)],
                  ["Tax 5%", "$" + tax.toFixed(2)],
                ].map(([l, v]) => (
                  <div
                    key={l}
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      marginBottom: 8,
                      fontSize: 14,
                    }}
                  >
                    <span style={{ color: "#888" }}>{l}</span>
                    <span style={{ fontWeight: 600 }}>{v}</span>
                  </div>
                ))}
                <div
                  style={{
                    borderTop: "1.5px solid #F0E4CC",
                    paddingTop: 14,
                    display: "flex",
                    justifyContent: "space-between",
                    marginBottom: 20,
                  }}
                >
                  <span style={{ fontWeight: 800, fontSize: 18 }}>Total</span>
                  <span
                    style={{ fontWeight: 900, fontSize: 20, color: "#8B1A1A" }}
                  >
                    {"$" + total.toFixed(2)}
                  </span>
                </div>
                <button
                  className="as-btn"
                  onClick={place}
                  disabled={busy}
                  style={{
                    width: "100%",
                    padding: 14,
                    background: "linear-gradient(135deg,#8B1A1A,#C9A84C)",
                    color: "#fff",
                    borderRadius: 12,
                    fontSize: 15,
                    fontWeight: 700,
                    opacity: busy ? 0.7 : 1,
                  }}
                >
                  {busy ? "Placing order..." : "Place order 🎉"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      function OrdersPage({ orders }) {
        const SC = {
          Confirmed: "#1A5C2A",
          Preparing: "#856404",
          Ready: "#0D47A1",
          Delivered: "#555",
          Cancelled: "#8B1A1A",
        };
        if (!orders.length)
          return (
            <div
              style={{
                textAlign: "center",
                padding: "80px 20px",
                color: "#bbb",
              }}
            >
              <div style={{ fontSize: 76, marginBottom: 18 }}>📦</div>
              <h2
                className="serif"
                style={{ fontSize: 26, color: "#1A0A0A", marginBottom: 10 }}
              >
                No orders yet
              </h2>
              <p>Place your first order from our menu!</p>
            </div>
          );
        return (
          <div
            style={{ maxWidth: 880, margin: "0 auto", padding: "40px 20px" }}
          >
            <h1
              className="serif"
              style={{ fontSize: 34, color: "#1A0A0A", marginBottom: 30 }}
            >
              My orders 📦
            </h1>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {[...orders].reverse().map((o) => (
                <div
                  key={o.id}
                  className="slide-in"
                  style={{
                    background: "#fff",
                    borderRadius: 14,
                    padding: 22,
                    border: "1px solid #F0E4CC",
                  }}
                >
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "center",
                      flexWrap: "wrap",
                      gap: 10,
                      marginBottom: 14,
                    }}
                  >
                    <div>
                      <div
                        className="serif"
                        style={{
                          fontWeight: 700,
                          fontSize: 18,
                          color: "#1A0A0A",
                        }}
                      >
                        {o.id}
                      </div>
                      <div style={{ color: "#bbb", fontSize: 12 }}>
                        {new Date(o.date).toLocaleString()}
                      </div>
                    </div>
                    <span
                      style={{
                        background: SC[o.status] || "#555",
                        color: "#fff",
                        padding: "5px 14px",
                        borderRadius: 20,
                        fontSize: 12,
                        fontWeight: 700,
                      }}
                    >
                      {o.status}
                    </span>
                  </div>
                  <div
                    style={{
                      display: "flex",
                      flexWrap: "wrap",
                      gap: 7,
                      marginBottom: 12,
                    }}
                  >
                    {o.items.map((i) => (
                      <span
                        key={i.id}
                        style={{
                          background: "#FDF8F0",
                          border: "1px solid #F0E4CC",
                          padding: "4px 11px",
                          borderRadius: 20,
                          fontSize: 12,
                        }}
                      >
                        {i.em} {i.name} x{i.qty}
                      </span>
                    ))}
                  </div>
                  {o.phone && (
                    <div
                      style={{ fontSize: 12, color: "#666", marginBottom: 3 }}
                    >
                      📞 {o.phone}
                    </div>
                  )}
                  {o.addr && (
                    <div
                      style={{ fontSize: 12, color: "#666", marginBottom: 10 }}
                    >
                      📍 {o.addr}
                    </div>
                  )}
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "flex-end",
                      alignItems: "center",
                      gap: 8,
                      borderTop: "1px solid #F0E4CC",
                      paddingTop: 12,
                    }}
                  >
                    <span style={{ color: "#888", fontSize: 13 }}>Total:</span>
                    <span
                      style={{
                        fontWeight: 900,
                        fontSize: 20,
                        color: "#8B1A1A",
                      }}
                    >
                      {"$" + o.total.toFixed(2)}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function Dashboard({ orders }) {
        const rev = orders.reduce((s, o) => s + o.total, 0);
        const qty = orders.reduce(
          (s, o) => s + o.items.reduce((a, i) => a + i.qty, 0),
          0,
        );
        const topItems = MENU.map((m) => ({
          ...m,
          sold: orders.reduce(
            (s, o) =>
              s +
              o.items
                .filter((i) => i.id === m.id)
                .reduce((a, i) => a + i.qty, 0),
            0,
          ),
        }))
          .filter((m) => m.sold > 0)
          .sort((a, b) => b.sold - a.sold)
          .slice(0, 5);
        const catRev = [
          "Sweets",
          "Cakes",
          "Coffee & Tea",
          "Fresh Juice",
          "Food",
        ].map((c) => ({
          c,
          v: orders.reduce(
            (s, o) =>
              s +
              o.items
                .filter((i) => i.cat === c)
                .reduce((a, i) => a + i.price * i.qty, 0),
            0,
          ),
        }));
        const maxCat = Math.max(...catRev.map((x) => x.v), 1);
        const COLORS = ["#8B1A1A", "#1A5C2A", "#0D47A1", "#856404", "#6A1E6A"];
        const kpi = [
          ["📦", "Orders", orders.length, "#8B1A1A"],
          ["💰", "Revenue", "$" + rev.toFixed(2), "#1A5C2A"],
          ["🍽", "Items Sold", qty, "#856404"],
          [
            "📊",
            "Avg Order",
            orders.length ? "$" + (rev / orders.length).toFixed(2) : "$0",
            "#0D47A1",
          ],
        ];
        return (
          <div
            style={{ maxWidth: 1100, margin: "0 auto", padding: "40px 20px" }}
          >
            <div style={{ marginBottom: 30 }}>
              <p
                style={{
                  color: "#C9A84C",
                  fontSize: 12,
                  fontWeight: 700,
                  letterSpacing: 3,
                  textTransform: "uppercase",
                  marginBottom: 6,
                }}
              >
                Business Dashboard
              </p>
              <h1 className="serif" style={{ fontSize: 34, color: "#1A0A0A" }}>
                Akram Sweets Analytics
              </h1>
              <p style={{ color: "#888", fontSize: 13 }}>
                Owner: Mohamed · {new Date().toLocaleDateString()}
              </p>
            </div>
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(auto-fit,minmax(190px,1fr))",
                gap: 18,
                marginBottom: 24,
              }}
            >
              {kpi.map(([ic, l, v, col]) => (
                <div key={l} className="as-card" style={{ padding: 22 }}>
                  <div style={{ fontSize: 34, marginBottom: 8 }}>{ic}</div>
                  <div
                    className="serif"
                    style={{ fontSize: 28, fontWeight: 900, color: col }}
                  >
                    {v}
                  </div>
                  <div style={{ color: "#888", fontSize: 12, fontWeight: 500 }}>
                    {l}
                  </div>
                </div>
              ))}
            </div>
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "1fr 1fr",
                gap: 22,
                marginBottom: 22,
              }}
            >
              <div
                style={{
                  background: "#fff",
                  borderRadius: 16,
                  padding: 22,
                  border: "1px solid #F0E4CC",
                }}
              >
                <h3
                  className="serif"
                  style={{ fontSize: 19, color: "#1A0A0A", marginBottom: 18 }}
                >
                  Top Selling Items
                </h3>
                {topItems.length === 0 ? (
                  <p
                    style={{
                      color: "#bbb",
                      textAlign: "center",
                      padding: "20px 0",
                    }}
                  >
                    No orders yet
                  </p>
                ) : (
                  topItems.map((m, i) => (
                    <div
                      key={m.id}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 10,
                        marginBottom: 12,
                        padding: "9px 12px",
                        background: i === 0 ? "#FFF8DC" : "#FDF8F0",
                        borderRadius: 10,
                      }}
                    >
                      <span
                        style={{
                          fontWeight: 900,
                          color: "#C9A84C",
                          fontSize: 17,
                          width: 22,
                        }}
                      >
                        {i + 1}
                      </span>
                      <span style={{ fontSize: 24 }}>{m.em}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 13 }}>
                          {m.name}
                        </div>
                        <div style={{ color: "#bbb", fontSize: 11 }}>
                          {"$" + m.price + " · " + m.cat}
                        </div>
                      </div>
                      <span
                        style={{
                          background: "#8B1A1A",
                          color: "#fff",
                          padding: "3px 10px",
                          borderRadius: 20,
                          fontSize: 12,
                          fontWeight: 700,
                        }}
                      >
                        {m.sold} sold
                      </span>
                    </div>
                  ))
                )}
              </div>
              <div
                style={{
                  background: "#fff",
                  borderRadius: 16,
                  padding: 22,
                  border: "1px solid #F0E4CC",
                }}
              >
                <h3
                  className="serif"
                  style={{ fontSize: 19, color: "#1A0A0A", marginBottom: 18 }}
                >
                  Revenue by Category
                </h3>
                {catRev.map(({ c, v }, i) => (
                  <div key={c} style={{ marginBottom: 16 }}>
                    <div
                      style={{
                        display: "flex",
                        justifyContent: "space-between",
                        marginBottom: 5,
                        fontSize: 13,
                      }}
                    >
                      <span style={{ fontWeight: 600 }}>{c}</span>
                      <span style={{ fontWeight: 700, color: COLORS[i] }}>
                        {"$" + v.toFixed(2)}
                      </span>
                    </div>
                    <div
                      style={{
                        background: "#F0E4CC",
                        borderRadius: 50,
                        height: 9,
                        overflow: "hidden",
                      }}
                    >
                      <div
                        style={{
                          background: COLORS[i],
                          height: "100%",
                          width: (v / maxCat) * 100 + "%",
                          borderRadius: 50,
                          transition: "width 1s ease",
                        }}
                      />
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div
              style={{
                background: "#fff",
                borderRadius: 16,
                padding: 22,
                border: "1px solid #F0E4CC",
              }}
            >
              <h3
                className="serif"
                style={{ fontSize: 19, color: "#1A0A0A", marginBottom: 18 }}
              >
                Recent Orders
              </h3>
              {orders.length === 0 ? (
                <p
                  style={{
                    color: "#bbb",
                    textAlign: "center",
                    padding: "20px 0",
                  }}
                >
                  No orders yet
                </p>
              ) : (
                <div style={{ overflowX: "auto" }}>
                  <table
                    style={{
                      width: "100%",
                      borderCollapse: "collapse",
                      fontSize: 13,
                    }}
                  >
                    <thead>
                      <tr style={{ background: "#FDF8F0" }}>
                        {["Order ID", "Items", "Total", "Status", "Date"].map(
                          (h) => (
                            <th
                              key={h}
                              style={{
                                textAlign: "left",
                                padding: "11px 14px",
                                fontWeight: 700,
                                color: "#666",
                                borderBottom: "1.5px solid #F0E4CC",
                              }}
                            >
                              {h}
                            </th>
                          ),
                        )}
                      </tr>
                    </thead>
                    <tbody>
                      {[...orders]
                        .reverse()
                        .slice(0, 10)
                        .map((o) => (
                          <tr
                            key={o.id}
                            style={{ borderBottom: "1px solid #F0E4CC" }}
                          >
                            <td
                              style={{
                                padding: "11px 14px",
                                fontWeight: 700,
                                color: "#8B1A1A",
                              }}
                            >
                              {o.id}
                            </td>
                            <td style={{ padding: "11px 14px" }}>
                              {o.items.map((i) => i.em).join(" ")}
                            </td>
                            <td
                              style={{ padding: "11px 14px", fontWeight: 700 }}
                            >
                              {"$" + o.total.toFixed(2)}
                            </td>
                            <td style={{ padding: "11px 14px" }}>
                              <span
                                style={{
                                  background: "#1A5C2A",
                                  color: "#fff",
                                  padding: "2px 9px",
                                  borderRadius: 20,
                                  fontSize: 11,
                                  fontWeight: 700,
                                }}
                              >
                                {o.status}
                              </span>
                            </td>
                            <td style={{ padding: "11px 14px", color: "#bbb" }}>
                              {new Date(o.date).toLocaleDateString()}
                            </td>
                          </tr>
                        ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        );
      }

      function App() {
        const [user, setUser] = useState(() => ls.get("session"));
        const [page, setPage] = useState("home");
        const [cart, setCart] = useState([]);
        const [orders, setOrders] = useState(() => ls.get("orders") || []);
        const { toasts, addToast } = useToast();

        useEffect(() => {
          const users = ls.get("users") || [];
          if (!users.find((u) => u.email === "demo@akram.so"))
            ls.set("users", [
              ...users,
              {
                id: 0,
                name: "Mohamed Adan Mohamed",
                email: "mohamed@akram.so",
                pw: "mohamed123",
                joined: new Date().toISOString(),
              },
            ]);
        }, []);

        useEffect(() => ls.set("orders", orders), [orders]);

        const addOrder = (o) => setOrders((p) => [...p, o]);
        const logout = () => {
          ls.set("session", null);
          setUser(null);
          setPage("home");
          setCart([]);
        };
        const cartCount = cart.reduce((s, i) => s + i.qty, 0);

        if (!user)
          return (
            <>
              <Toasts toasts={toasts} />
              <AuthPage
                onLogin={(u) => {
                  setUser(u);
                  setPage("home");
                }}
                toast={addToast}
              />
            </>
          );

        const pages = {
          home: <HomePage setPage={setPage} />,
          menu: <MenuPage cart={cart} setCart={setCart} toast={addToast} />,
          cart: (
            <CartPage
              cart={cart}
              setCart={setCart}
              toast={addToast}
              setPage={setPage}
              addOrder={addOrder}
            />
          ),
          orders: <OrdersPage orders={orders} />,
          dashboard: <Dashboard orders={orders} />,
        };

        return (
          <div style={{ minHeight: "100vh", background: "#FDF8F0" }}>
            <Toasts toasts={toasts} />
            <Navbar
              user={user}
              cartCount={cartCount}
              page={page}
              setPage={setPage}
              onLogout={logout}
            />
            <div key={page} className="fade-up">
              {pages[page] || pages.home}
            </div>
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
